title: "[Pregunta] "
body:
  - type: textarea
    id: goal
    attributes:
      label: ¿Qué quieres conseguir?
      description: Explica el resultado final que buscas.
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: ¿Qué has probado?
      description: Incluye pasos, mensajes y capturas saneadas que ayuden a entenderlo.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Versión de LakeDB
      placeholder: v0.5.0
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacidad
      options:
        - label: He eliminado credenciales y datos sensibles.
          required: true
