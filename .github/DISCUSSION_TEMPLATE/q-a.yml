title: "[Question] "
body:
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to achieve?
      description: Explain the outcome you want.
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      description: Include steps, messages and sanitized screenshots that help explain the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LakeDB version
      placeholder: v0.6.0
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I removed credentials and sensitive data.
          required: true
