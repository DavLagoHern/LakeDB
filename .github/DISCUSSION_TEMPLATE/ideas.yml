title: "[Idea] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for LakeDB. Search for similar proposals first and vote if one already exists.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe your current workflow and what slows you down or limits you.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: How would you like it to work?
      description: You do not need every detail; describe the ideal experience.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: LakeDB area
      options:
        - Connections
        - SQL editor
        - Explorer and tables
        - Import, backup or migrations
        - Security
        - Customization
        - LakeDB Pro
        - Other
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: How often would this help?
      options:
        - Every day
        - Several times a week
        - A few times a month
        - Occasionally
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Current alternatives
      description: How do you handle this today in LakeDB or another tool?
  - type: checkboxes
    id: checks
    attributes:
      label: Before posting
      options:
        - label: I searched for a similar idea.
          required: true
        - label: I removed credentials and sensitive data.
          required: true
