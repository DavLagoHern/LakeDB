name: Documentation improvement
description: Suggest a correction for the README, Wiki or guides.
title: "[Docs] "
labels: [documentation]
body:
  - type: input
    id: location
    attributes:
      label: Page or section
      placeholder: Wiki > Connections, SSL and SSH
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is incorrect or unclear?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Add suggested wording or explain what information is missing.
    validations:
      required: true
