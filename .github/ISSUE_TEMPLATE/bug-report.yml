name: Bug report
description: Report a reproducible problem in LakeDB.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve LakeDB. Never include passwords, private IP addresses, confidential queries or real production data.
  - type: input
    id: version
    attributes:
      label: LakeDB version
      placeholder: v0.11.0-beta.1
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Operating system and device
      placeholder: Windows 11 x64, macOS 15 on M2, Ubuntu 24.04 x64
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database engine
      options: [MySQL, MariaDB, Not applicable, Other]
    validations:
      required: true
  - type: input
    id: database-version
    attributes:
      label: Server version
      placeholder: MySQL 8.4 or MariaDB 11.4
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Click…
        3. See…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include the exact message and sanitized screenshots when useful.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: You can paste the reviewed support report from View → Diagnostics when relevant.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for similar reports.
          required: true
        - label: I removed credentials and sensitive data.
          required: true
