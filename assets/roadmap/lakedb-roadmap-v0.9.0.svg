<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The road to LakeDB 1.0</title>
  <desc id="desc">LakeDB 0.9.0 complete beta capabilities, the trust work planned for 1.0, and carefully selected ideas for later.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#030814"/>
      <stop offset=".58" stop-color="#06152a"/>
      <stop offset="1" stop-color="#08203d"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#1686ff"/>
      <stop offset=".55" stop-color="#24d8ff"/>
      <stop offset="1" stop-color="#55f0bd"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="30" fill="url(#bg)"/>
  <circle cx="1465" cy="44" r="280" fill="#0b7cff" opacity=".07"/>
  <path d="M0 760C260 648 470 742 728 679C1018 608 1208 626 1600 548V900H0Z" fill="#0b5670" opacity=".09"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="78" fill="#7fdfff" font-size="18" font-weight="800" letter-spacing="3">LAKEDB ROADMAP</text>
    <text x="72" y="145" fill="#ffffff" font-size="55" font-weight="900">The road to LakeDB 1.0</text>
    <text x="72" y="188" fill="#9bb0ca" font-size="21">0.9.0 is the complete local beta. 1.0 turns that foundation into a trusted release.</text>

    <rect x="72" y="235" width="1456" height="6" rx="3" fill="#18344f"/>
    <rect x="72" y="235" width="750" height="6" rx="3" fill="url(#progress)" filter="url(#softGlow)"/>
    <text x="72" y="271" fill="#55f0bd" font-size="14" font-weight="800">CURRENT PRODUCT</text>
    <text x="1394" y="271" fill="#6f87a5" font-size="14" font-weight="700">TOWARD 1.0</text>

    <rect x="72" y="302" width="754" height="500" rx="18" fill="#0a1729" stroke="#24425f" stroke-width="2"/>
    <rect x="72" y="302" width="6" height="500" rx="3" fill="#55f0bd"/>
    <text x="110" y="351" fill="#55f0bd" font-size="18" font-weight="900" letter-spacing="2">CURRENT PUBLIC BETA</text>
    <text x="110" y="421" fill="#ffffff" font-size="62" font-weight="900">0.9.0</text>
    <text x="310" y="410" fill="#7fdfff" font-size="27" font-weight="800">Complete local database client</text>
    <text x="310" y="440" fill="#8ea5c0" font-size="16">MySQL and MariaDB workflows, from connection to delivery.</text>

    <line x1="110" y1="474" x2="788" y2="474" stroke="#213a55"/>

    <g font-size="14">
      <g transform="translate(110 514)">
        <circle cx="7" cy="-5" r="5" fill="#55f0bd"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">Connections</text>
        <text x="24" y="23" fill="#9bb0ca">Folders, SSL, SSH, environments and reconnect</text>
      </g>
      <g transform="translate(110 584)">
        <circle cx="7" cy="-5" r="5" fill="#55f0bd"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">SQL workspace</text>
        <text x="24" y="23" fill="#9bb0ca">Monaco tabs, execution, history and favorites</text>
      </g>
      <g transform="translate(110 654)">
        <circle cx="7" cy="-5" r="5" fill="#55f0bd"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">Table data</text>
        <text x="24" y="23" fill="#9bb0ca">Browse, filter, edit safely and export</text>
      </g>
      <g transform="translate(110 724)">
        <circle cx="7" cy="-5" r="5" fill="#55f0bd"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">Data tools</text>
        <text x="24" y="23" fill="#9bb0ca">Import, backup, restore, compare and migrate</text>
      </g>

      <g transform="translate(466 514)">
        <circle cx="7" cy="-5" r="5" fill="#24d8ff"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">Multiple workspaces</text>
        <text x="24" y="23" fill="#9bb0ca">Independent connections and recovered sessions</text>
      </g>
      <g transform="translate(466 584)">
        <circle cx="7" cy="-5" r="5" fill="#24d8ff"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">Object explorer</text>
        <text x="24" y="23" fill="#9bb0ca">Schemas, objects, structure and generated SQL</text>
      </g>
      <g transform="translate(466 654)">
        <circle cx="7" cy="-5" r="5" fill="#24d8ff"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">Safety</text>
        <text x="24" y="23" fill="#9bb0ca">Encrypted credentials, read-only and prod checks</text>
      </g>
      <g transform="translate(466 724)">
        <circle cx="7" cy="-5" r="5" fill="#24d8ff"/>
        <text x="24" y="0" fill="#ffffff" font-weight="800">Desktop experience</text>
        <text x="24" y="23" fill="#9bb0ca">Themes, EN/ES UI, updates and diagnostics</text>
      </g>
    </g>

    <rect x="858" y="302" width="670" height="302" rx="18" fill="#0a2032" stroke="#36d9b0" stroke-width="2"/>
    <text x="896" y="351" fill="#7fdfff" font-size="18" font-weight="900" letter-spacing="2">COMING NEXT</text>
    <text x="896" y="421" fill="#ffffff" font-size="62" font-weight="900">1.0</text>
    <text x="1034" y="410" fill="#55f0bd" font-size="27" font-weight="800">Trusted foundation</text>
    <text x="1034" y="440" fill="#9bb0ca" font-size="16">Confidence in every install, update and recovery.</text>
    <line x1="896" y1="474" x2="1490" y2="474" stroke="#28526a"/>
    <g font-size="16">
      <circle cx="903" cy="510" r="5" fill="#55f0bd"/><text x="920" y="516" fill="#dcecff"><tspan font-weight="800">Trusted delivery</tspan><tspan fill="#9bb0ca"> · signing, notarization and checksums</tspan></text>
      <circle cx="903" cy="550" r="5" fill="#55f0bd"/><text x="920" y="556" fill="#dcecff"><tspan font-weight="800">Compatibility</tspan><tspan fill="#9bb0ca"> · tested OS and database matrix</tspan></text>
      <circle cx="903" cy="590" r="5" fill="#55f0bd"/><text x="920" y="596" fill="#dcecff"><tspan font-weight="800">Product polish</tspan><tspan fill="#9bb0ca"> · accessibility, performance and recovery</tspan></text>
    </g>

    <rect x="858" y="632" width="670" height="170" rx="18" fill="#091426" stroke="#24425f" stroke-width="2"/>
    <text x="896" y="678" fill="#91a6c2" font-size="18" font-weight="900" letter-spacing="2">AFTER 1.0 · EXPLORE CAREFULLY</text>
    <g fill="#dcecff" font-size="16">
      <circle cx="903" cy="716" r="4" fill="#1686ff"/><text x="920" y="722">Safer schema drift automation and Lake AI</text>
      <circle cx="903" cy="753" r="4" fill="#1686ff"/><text x="920" y="759">Cloud sync, dashboards, scheduled queries and teams</text>
    </g>

    <text x="72" y="856" fill="#6f87a5" font-size="15">Updated for LakeDB 0.9.0 · Direction, not a fixed schedule · LakeDB Free keeps the complete local foundation.</text>
  </g>
</svg>
